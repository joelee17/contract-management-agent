databases:
  - name: contract-agent-db
    plan: free
    databaseName: contract_agent
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  - type: web
    name: contract-agent-api
    runtime: node
    plan: starter
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: contract-agent-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_KEY
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: FRONTEND_URL
        value: https://contract-agent-web.onrender.com
      - key: WEBHOOK_BASE_URL
        value: https://contract-agent-api.onrender.com
      - key: NODE_ENV
        value: production

  - type: web
    name: contract-agent-web
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://contract-agent-api.onrender.com
    routes:
      - type: rewrite
        source: /api/*
        destination: https://contract-agent-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
